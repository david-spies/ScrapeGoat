<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ScrapeGoat — web data extraction terminal</title>
  <desc>Tech-noir typographic banner for ScrapeGoat with circuit traces, a glitched title, feature pills, and a solarized green terminal aesthetic on a dark grid background.</desc>

  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e2d3d" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#0f1a24" stroke-width="0.4"/>
    </pattern>
    <clipPath id="clip">
      <rect width="680" height="220" rx="6"/>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
    .syn  { font-family: 'Syncopate', 'Arial Black', sans-serif; font-weight: 700; letter-spacing: 0.14em; }
  </style>

  <g clip-path="url(#clip)">

    <!-- Background layers -->
    <rect width="680" height="220" fill="#080a0f"/>
    <rect width="680" height="220" fill="url(#grid-fine)"/>
    <rect width="680" height="220" fill="url(#grid)"/>

    <!-- Ambient washes -->
    <rect x="0"   y="0"  width="60"  height="220" fill="#39d353" opacity="0.03"/>
    <rect x="620" y="0"  width="60"  height="220" fill="#39d353" opacity="0.02"/>
    <rect x="0"   y="64" width="680" height="72"  fill="#39d353" opacity="0.018"/>

    <!-- Top border -->
    <line x1="0" y1="1"   x2="680" y2="1"   stroke="#39d353" stroke-width="0.75"/>
    <line x1="0" y1="3"   x2="680" y2="3"   stroke="#1e2d3d" stroke-width="0.5"/>
    <!-- Bottom border -->
    <line x1="0" y1="219" x2="680" y2="219" stroke="#39d353" stroke-width="0.75"/>
    <line x1="0" y1="217" x2="680" y2="217" stroke="#1e2d3d" stroke-width="0.5"/>

    <!-- Tick marks top -->
    <line x1="40"  y1="0" x2="40"  y2="8" stroke="#39d353" stroke-width="1.5"/>
    <line x1="80"  y1="0" x2="80"  y2="5" stroke="#1a6b28" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="5" stroke="#1a6b28" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="8" stroke="#39d353" stroke-width="1.5"/>
    <!-- Tick marks bottom -->
    <line x1="40"  y1="220" x2="40"  y2="212" stroke="#39d353" stroke-width="1.5"/>
    <line x1="640" y1="220" x2="640" y2="212" stroke="#39d353" stroke-width="1.5"/>
    <line x1="200" y1="220" x2="200" y2="215" stroke="#1a6b28" stroke-width="1"/>
    <line x1="480" y1="220" x2="480" y2="215" stroke="#1a6b28" stroke-width="1"/>

    <!-- Corner brackets -->
    <polyline points="6,20 6,6 20,6"          fill="none" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="674,20 674,6 660,6"      fill="none" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="6,200 6,214 20,214"      fill="none" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="674,200 674,214 660,214" fill="none" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Left circuit bus -->
    <line x1="30" y1="20"  x2="30" y2="200" stroke="#1a6b28" stroke-width="0.75"/>
    <line x1="30" y1="50"  x2="56" y2="50"  stroke="#1a6b28" stroke-width="0.75"/>
    <line x1="30" y1="90"  x2="56" y2="90"  stroke="#39d353" stroke-width="0.75"/>
    <line x1="30" y1="130" x2="56" y2="130" stroke="#1a6b28" stroke-width="0.75"/>
    <line x1="30" y1="170" x2="56" y2="170" stroke="#1a6b28" stroke-width="0.75"/>
    <circle cx="30" cy="50"  r="2.5" fill="#1a6b28"/>
    <circle cx="30" cy="90"  r="3"   fill="#39d353"/>
    <circle cx="30" cy="130" r="2.5" fill="#1a6b28"/>
    <circle cx="30" cy="170" r="2.5" fill="#1a6b28"/>
    <circle cx="56" cy="50"  r="1.5" fill="#1a6b28"/>
    <circle cx="56" cy="90"  r="2"   fill="#39d353"/>
    <circle cx="56" cy="130" r="1.5" fill="#1a6b28"/>
    <circle cx="56" cy="170" r="1.5" fill="#1a6b28"/>

    <!-- Right circuit bus (mirror) -->
    <line x1="650" y1="20"  x2="650" y2="200" stroke="#1a6b28" stroke-width="0.75"/>
    <line x1="650" y1="50"  x2="624" y2="50"  stroke="#1a6b28" stroke-width="0.75"/>
    <line x1="650" y1="90"  x2="624" y2="90"  stroke="#39d353" stroke-width="0.75"/>
    <line x1="650" y1="130" x2="624" y2="130" stroke="#1a6b28" stroke-width="0.75"/>
    <line x1="650" y1="170" x2="624" y2="170" stroke="#1a6b28" stroke-width="0.75"/>
    <circle cx="650" cy="50"  r="2.5" fill="#1a6b28"/>
    <circle cx="650" cy="90"  r="3"   fill="#39d353"/>
    <circle cx="650" cy="130" r="2.5" fill="#1a6b28"/>
    <circle cx="650" cy="170" r="2.5" fill="#1a6b28"/>
    <circle cx="624" cy="50"  r="1.5" fill="#1a6b28"/>
    <circle cx="624" cy="90"  r="2"   fill="#39d353"/>
    <circle cx="624" cy="130" r="1.5" fill="#1a6b28"/>
    <circle cx="624" cy="170" r="1.5" fill="#1a6b28"/>

    <!-- Top corner traces -->
    <polyline points="70,30 90,30 90,42 110,42"   fill="none" stroke="#1a6b28" stroke-width="0.75"/>
    <circle cx="90"  cy="30" r="1.5" fill="#1a6b28"/>
    <circle cx="110" cy="42" r="1.5" fill="#1a6b28"/>
    <polyline points="610,30 590,30 590,42 570,42" fill="none" stroke="#1a6b28" stroke-width="0.75"/>
    <circle cx="590" cy="30" r="1.5" fill="#1a6b28"/>
    <circle cx="570" cy="42" r="1.5" fill="#1a6b28"/>

    <!-- Bottom corner traces -->
    <polyline points="70,190 110,190 110,182 140,182"   fill="none" stroke="#1a6b28" stroke-width="0.75"/>
    <circle cx="110" cy="190" r="1.5" fill="#1a6b28"/>
    <circle cx="140" cy="182" r="1.5" fill="#1a6b28"/>
    <polyline points="610,190 570,190 570,182 540,182" fill="none" stroke="#1a6b28" stroke-width="0.75"/>
    <circle cx="570" cy="190" r="1.5" fill="#1a6b28"/>
    <circle cx="540" cy="182" r="1.5" fill="#1a6b28"/>

    <!-- Version badge -->
    <rect x="70" y="22" width="62" height="15" rx="2" fill="#111820" stroke="#1a6b28" stroke-width="0.75"/>
    <text x="101" y="33.5" text-anchor="middle" class="mono" font-size="9" fill="#39d353" letter-spacing="0.12em">v2.1</text>
    <text x="145" y="34" class="mono" font-size="9" fill="#445566" letter-spacing="0.1em">// scrapegoat.html  ·  server.py</text>
    <text x="536" y="34" text-anchor="end" class="mono" font-size="9" fill="#445566" letter-spacing="0.08em">MIT LICENSE</text>

    <!-- Title — RGB glitch layers -->
    <text x="72" y="102" class="syn" font-size="58" fill="#ff2d55" opacity="0.28">SCRAPEGOAT</text>
    <text x="68" y="105" class="syn" font-size="58" fill="#00ffa3" opacity="0.18">SCRAPEGOAT</text>
    <text x="70" y="103" class="syn" font-size="58" fill="#e8eaf0">SCRAPEGOAT</text>

    <!-- Underline system -->
    <line x1="70"  y1="114" x2="612" y2="114" stroke="#1e2d3d" stroke-width="0.75"/>
    <line x1="70"  y1="114" x2="340" y2="114" stroke="#39d353" stroke-width="1.5"/>
    <circle cx="70"  cy="114" r="2"   fill="#39d353"/>
    <circle cx="340" cy="114" r="3"   fill="#39d353"/>
    <line x1="340" y1="114" x2="340" y2="122" stroke="#39d353" stroke-width="0.75"/>
    <circle cx="340" cy="122" r="1.5" fill="#1a6b28"/>

    <!-- Tagline -->
    <text x="70" y="138" class="mono" font-size="13" fill="#8899aa" letter-spacing="0.13em">// web data extraction terminal</text>

    <!-- Feature pills -->
    <rect x="70"  y="154" width="82" height="18" rx="2" fill="#111820" stroke="#1a6b28" stroke-width="0.75"/>
    <text x="111" y="167" text-anchor="middle" class="mono" font-size="10" fill="#39d353">Fetcher</text>

    <rect x="160" y="154" width="76" height="18" rx="2" fill="#111820" stroke="#1a6b28" stroke-width="0.75"/>
    <text x="198" y="167" text-anchor="middle" class="mono" font-size="10" fill="#39d353">Stealth</text>

    <rect x="244" y="154" width="84" height="18" rx="2" fill="#111820" stroke="#1a6b28" stroke-width="0.75"/>
    <text x="286" y="167" text-anchor="middle" class="mono" font-size="10" fill="#39d353">Dynamic</text>

    <rect x="336" y="154" width="80" height="18" rx="2" fill="#111820" stroke="#2a3f5a" stroke-width="0.75"/>
    <text x="376" y="167" text-anchor="middle" class="mono" font-size="10" fill="#8899aa">Sessions</text>

    <rect x="424" y="154" width="74" height="18" rx="2" fill="#111820" stroke="#2a3f5a" stroke-width="0.75"/>
    <text x="461" y="167" text-anchor="middle" class="mono" font-size="10" fill="#8899aa">Proxies</text>

    <rect x="506" y="154" width="60" height="18" rx="2" fill="#111820" stroke="#2a3f5a" stroke-width="0.75"/>
    <text x="536" y="167" text-anchor="middle" class="mono" font-size="10" fill="#8899aa">Async</text>

    <!-- Status line -->
    <circle cx="82"  cy="192" r="3.5" fill="#39d353"/>
    <text x="94"  y="196" class="mono" font-size="10" fill="#39d353" letter-spacing="0.08em">SYSTEM ONLINE</text>
    <line x1="198" y1="192" x2="612" y2="192" stroke="#1e2d3d" stroke-width="0.75"/>
    <line x1="198" y1="192" x2="340" y2="192" stroke="#39d353" stroke-width="0.75" opacity="0.45"/>
    <line x1="340" y1="192" x2="400" y2="192" stroke="#39d353" stroke-width="1"    opacity="0.2"/>
    <text x="612" y="196" text-anchor="end" class="mono" font-size="9" fill="#2a3f5a" letter-spacing="0.06em">127.0.0.1:7331</text>

  </g>
</svg>
